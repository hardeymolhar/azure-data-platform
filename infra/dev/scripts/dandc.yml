---
- name: Install .NET SDK, clone repo, configure Cosmos env, and run samples
  hosts: cosmos_vm
  become: true
  gather_facts: true

  vars:
    # Required: pass these via --extra-vars or vault
    cosmos_endpoint: "{{ cosmos_endpoint | default(omit) }}"
    cosmos_key: "{{ cosmos_key | default(omit) }}"
    dotnet_install_url: "https://dot.net/v1/dotnet-install.sh"
    dotnet_install_dir: "/usr/local/dotnet"
    cosmos_repo: "https://github.com/hardeymolhar/azure-data-platform.git"
    repo_dest: "/home/app"
    # NuGet package version from your script (you can bump this if desired)
    cosmos_nuget_version: "3.22.1"

  pre_tasks:
    - name: Fail if required vars are missing
      ansible.builtin.assert:
        that:
          - cosmos_endpoint is not none
          - cosmos_key is not none
        fail_msg: >-
          cosmos_endpoint and cosmos_key are required. Pass them with
          --extra-vars "cosmos_endpoint=... cosmos_key=..." or use Ansible Vault.

  tasks:
    - name: Install required packages (curl, git)
      ansible.builtin.dnf:
        name:
          - curl
          - git
        state: present
        update_cache: yes

    - name: Download dotnet-install.sh
      ansible.builtin.get_url:
        url: "{{ dotnet_install_url }}"
        dest: /tmp/dotnet-install.sh
        mode: '0755'
        validate_certs: yes

    - name: Run dotnet-install.sh (install SDK channel 8.0)
      ansible.builtin.command:
        argv:
          - /tmp/dotnet-install.sh
          - --channel
          - "8.0"
          - --install-dir
          - "{{ dotnet_install_dir }}"
      args:
        creates: "{{ dotnet_install_dir }}/dotnet"

    - name: Create /etc/profile.d/dotnet.sh (system-wide DOTNET vars)
      ansible.builtin.copy:
        dest: /etc/profile.d/dotnet.sh
        content: |
          export DOTNET_ROOT={{ dotnet_install_dir }}
          export PATH=$DOTNET_ROOT:$PATH
        owner: root
        group: root
        mode: '0644'

    - name: Ensure repo destination parent exists
      ansible.builtin.file:
        path: "{{ repo_dest | dirname }}"
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Clone repository into {{ repo_dest }} as azureuser
      ansible.builtin.git:
        repo: "{{ cosmos_repo }}"
        dest: "{{ repo_dest }}"
        version: HEAD
        force: yes
        accept_hostkey: yes
        update: yes
      become: true
      become_user: azureuser

    - name: Ensure ownership of {{ repo_dest }} is azureuser
      ansible.builtin.file:
        path: "{{ repo_dest }}"
        owner: azureuser
        group: azureuser
        recurse: yes
        state: directory

    - name: Create /etc/profile.d/cosmos.sh with environment variables
      ansible.builtin.copy:
        dest: /etc/profile.d/cosmos.sh
        content: |
          export COSMOS_ENDPOINT="{{ cosmos_endpoint }}"
          export COSMOS_KEY="{{ cosmos_key }}"
        owner: root
        group: root
        mode: '0644'

    - name: Run Cosmos SDK connection example (04-sdk-connect)
      ansible.builtin.shell: |
        # ensure dotnet path is available for this non-login shell
        source /etc/profile.d/dotnet.sh || true
        source /etc/profile.d/cosmos.sh || true
        dotnet restore
        dotnet add package Microsoft.Azure.Cosmos --version {{ cosmos_nuget_version }}
        dotnet build
        dotnet run
      args:
        chdir: "{{ repo_dest }}/terraform/cosmos-sdk/04-sdk-connect"
        warn: false
      become: false
      become_user: azureuser
      environment:
        DOTNET_ROOT: "{{ dotnet_install_dir }}"
        PATH: "{{ dotnet_install_dir }}:{{ ansible_env.PATH | default('/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin') }}"

    - name: Run Cosmos SDK transactional batch example (07-sdk-batch)
      ansible.builtin.shell: |
        source /etc/profile.d/dotnet.sh || true
        source /etc/profile.d/cosmos.sh || true
        dotnet restore
        dotnet add package Microsoft.Azure.Cosmos --version {{ cosmos_nuget_version }}
        dotnet build
        dotnet run
      args:
        chdir: "{{ repo_dest }}/terraform/cosmos-sdk/07-sdk-batch"
        warn: false
      become: false
      become_user: azureuser
      environment:
        DOTNET_ROOT: "{{ dotnet_install_dir }}"
        PATH: "{{ dotnet_install_dir }}:{{ ansible_env.PATH | default('/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin') }}"

  post_tasks:
    - name: Print completion message
      ansible.builtin.debug:
        msg: "Setup completed successfully on {{ inventory_hostname }}."